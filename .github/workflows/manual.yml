name: Download File

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Create downloads directory
      run: mkdir -p downloads
    
    - name: Download file
      run: |
        curl -L -o downloads/Ext2Fsd-0.71-setup.exe "https://github.com/bobranten/Ext4Fsd/releases/download/v0.71/Ext2Fsd-0.71-setup.exe"
    
    - name: List downloaded file
      run: ls -la downloads/
