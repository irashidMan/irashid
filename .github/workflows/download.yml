name: Download File

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
    - name: Create downloads directory
      run: mkdir -p downloads
    
    - name: Download file
      run: |
        curl -L -o downloads/Ext2Fsd-0.71-setup.exe "https://github.com/bobranten/Ext4Fsd/releases/download/v0.71/Ext2Fsd-0.71-setup.exe"
    
    - name: Upload as artifact (THIS SAVES THE FILE)
      uses: actions/upload-artifact@v4
      with:
        name: Ext2Fsd-installer
        path: downloads/
